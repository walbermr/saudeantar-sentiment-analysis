name: torchbert
channels:
  - defaults
  - pytorch
  - nvidia
dependencies:
  - python
  - pip
  - pytorch 
  - torchvision 
  - torchaudio 
  - pytorch-cuda=11.8
  - pip:
    - numpy==1.26.4
    - pandas
    - transformers
    - matplotlib
    - onnxruntime
    - onnx
    - onnxruntime_extensions